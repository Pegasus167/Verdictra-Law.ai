# nginx/nginx.conf
# ── Verdictra LAW.ai — Nginx Reverse Proxy ────────────────────────────────────
# Routes:
#   /api/*           → FastAPI backend (port 8000)
#   /ask/*           → FastAPI backend (SSE streaming — no buffering)
#   /deep-research/* → FastAPI backend (SSE streaming — no buffering)
#   /pdf/*           → FastAPI backend (file serving)
#   /*               → React frontend (port 80)
#
# In production replace the server_name and add SSL cert paths.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # File upload size — 50MB max for PDF uploads
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;  # Replace with your domain in production

        # ── SSE endpoints — disable buffering for real-time streaming ──────────
        location /ask/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        location /deep-research/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        # ── API endpoints ──────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── PDF serving ────────────────────────────────────────────────────────
        location /pdf/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
        }

        # ── All other routes → React frontend ─────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # SPA fallback — React Router handles its own routing
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}